name: Python tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Run tests
        run: python -m pytest tests
      - name: Generate sample outputs
        run: |
          python python/catalyst_grit_core.py examples/grit_record_input.json --format json --output outputs/grit_record_output.json
          python python/catalyst_grit_core.py examples/grit_record_input.json --format markdown --output outputs/grit_record_brief.md
