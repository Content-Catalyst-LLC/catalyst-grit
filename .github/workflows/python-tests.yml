name: Release contract

on:
  push:
  pull_request:

jobs:
  release-contract:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run Python and contract tests
        run: python -m pytest tests
      - name: Run browser parity and JavaScript syntax
        run: |
          node scripts/check_js_parity.js
          node --check wordpress/catalyst-grit-demo/assets/catalyst-grit-demo.js
          node --check wordpress/catalyst-grit-demo/assets/catalyst-grit-workspace.js
      - name: Run PHP syntax when available
        run: |
          if command -v php >/dev/null 2>&1; then
            php -l wordpress/catalyst-grit-demo/catalyst-grit-demo.php
          else
            echo 'PHP unavailable; syntax check skipped.'
          fi
      - name: Generate and compare committed examples
        run: |
          python python/catalyst_grit_core.py generate examples/grit_record_input.json --format json --output outputs/grit_record_output.json
          python python/catalyst_grit_core.py generate examples/grit_record_input.json --format markdown --output outputs/grit_record_brief.md
          diff -u examples/grit_record_output.json outputs/grit_record_output.json
          diff -u examples/grit_record_brief.md outputs/grit_record_brief.md
      - name: Build and inspect package
        run: |
          python -m build --no-isolation
          python -m pip install --force-reinstall --no-deps dist/catalyst_grit-*.whl
          python -c "import catalyst_grit; assert catalyst_grit.__version__ == '1.2.0'; assert [m.version for m in catalyst_grit.MigrationManager.available()] == [1, 2]"
      - name: Portable smoke test
        run: python scripts/smoke_test.py
