openapi: 3.1.0
info:
  title: Catalyst Grit Recovery Record API
  version: 1.6.0
  summary: Canonical recovery-record validation and generation contract
  description: >-
    Catalyst Grit v1.6.0 validates, migrates, and generates recovery records
    containing condition maps, executable recovery plans, structured retrospectives,
    source-linked adaptation-pattern candidates, uncertainty, and human review.
    The private workspace contract also supports explicit team roles, consent-aware
    facilitated reviews, scoped perspectives, and shared agreements with immutable history.
    Pattern candidates are descriptive and reviewable. They must not be used for
    diagnosis, character scoring, personality inference, employee ranking,
    automated eligibility, or performance evaluation. Persistent project pattern
    aggregation, system-change, and facilitated-review workflows remain private local
    workspace and CLI operations until the planned public API release.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
paths:
  /api/grit/v1/records/validate:
    post:
      summary: Validate and normalize a recovery-record request
      operationId: validateGritRecoveryRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryRecordRequest'
      responses:
        '200':
          description: Canonical normalized request, including visible compatibility defaults
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryRecordRequest'
        '400':
          $ref: '#/components/responses/ValidationFailure'
  /api/grit/v1/records/generate:
    post:
      summary: Generate a canonical recovery record and learning loop
      operationId: generateGritRecoveryRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryRecordRequest'
      responses:
        '200':
          description: >-
            Canonical record with condition map, recovery plan, retrospective,
            explainable adaptation patterns, and review guidance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryRecord'
        '400':
          $ref: '#/components/responses/ValidationFailure'
  /api/grit/v1/migrations/v1.0:
    post:
      summary: Migrate a v1.0.x flat request to the current request contract
      operationId: migrateGritV1Request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegacyRecoveryRequest'
      responses:
        '200':
          description: Migrated v1.6.0 request with visible compatibility defaults
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryRecordRequest'
        '400':
          $ref: '#/components/responses/ValidationFailure'
  /api/grit/v1/methodology/default:
    get:
      summary: Read the default versioned methodology profile
      operationId: getDefaultGritMethodology
      responses:
        '200':
          description: Default methodology profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MethodologyProfile'
components:
  responses:
    ValidationFailure:
      description: Structured validation failure with JSON paths
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
  schemas:
    RecoveryRecordRequest:
      $ref: './schemas/catalyst_grit_request.schema.json'
    RecoveryRecord:
      $ref: './schemas/catalyst_grit_record.schema.json'
    MethodologyProfile:
      $ref: './schemas/catalyst_grit_methodology_profile.schema.json'
    ValidationError:
      type: object
      additionalProperties: false
      required: [error, message, issues]
      properties:
        error:
          const: validation_failed
        message:
          type: string
        issues:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [path, code, message]
            properties:
              path:
                type: string
              code:
                type: string
              message:
                type: string
              value: {}
    LegacyRecoveryRequest:
      type: object
      description: v1.0.x flat recovery-record request accepted by the migration endpoint.
      additionalProperties: true
