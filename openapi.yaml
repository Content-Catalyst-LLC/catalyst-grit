openapi: 3.0.3
info:
  title: Catalyst Grit Recovery Record API
  version: 1.0.1
  description: >-
    Contract for generating structured Catalyst Grit recovery records. The
    repository does not ship a production web server in v1.0.1; this document
    defines the canonical API surface for integrations.
paths:
  /api/grit/records/generate:
    post:
      summary: Generate a recovery record
      operationId: generateGritRecoveryRecord
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryRecordInput'
      responses:
        '200':
          description: Generated recovery record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryRecordOutput'
        '400':
          description: Invalid recovery-record input
components:
  schemas:
    RecoveryRecordInput:
      type: object
      required:
        - challenge
        - domain
        - impact_severity
        - pressure_level
        - energy_level
        - support_level
        - clarity_level
        - recovery_actions
        - time_horizon_days
        - review_status
      properties:
        challenge: {type: string, minLength: 1}
        domain:
          type: string
          enum: [work, learning, health_wellbeing, relationship, project, career, other]
        impact_severity: {type: number, minimum: 1, maximum: 10}
        pressure_level: {type: number, minimum: 1, maximum: 10}
        energy_level: {type: number, minimum: 1, maximum: 10}
        support_level: {type: number, minimum: 1, maximum: 10}
        clarity_level: {type: number, minimum: 1, maximum: 10}
        recovery_actions:
          type: array
          minItems: 1
          items: {type: string, minLength: 1}
        time_horizon_days: {type: integer, minimum: 1}
        review_status:
          type: string
          enum: [draft, needs_review, reviewed]
    RecoveryRecordOutput:
      allOf:
        - $ref: '#/components/schemas/RecoveryRecordInput'
        - type: object
          required:
            - recovery_score
            - resilience_state
            - risk_flags
            - next_actions
            - decision_note
            - method_path
            - schema_version
            - engine_version
          properties:
            recovery_score: {type: number, minimum: 0, maximum: 100}
            resilience_state: {type: string}
            risk_flags: {type: array, items: {type: string}}
            next_actions: {type: array, items: {type: string}}
            decision_note: {type: string}
            method_path: {type: array, items: {type: string}}
            schema_version: {type: string, enum: ['1.0.1']}
            engine_version: {type: string, enum: ['1.0.1']}
